name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
    build-and-release:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "8.0.x"

            - name: Resolve version
              id: ver
              shell: pwsh
              run: |
                  [xml]$project = Get-Content -LiteralPath './AudioDeviceCmdlets.csproj'
                  $version = $project.Project.PropertyGroup.Version | Select-Object -First 1

                  if (-not $version) {
                    throw 'Version property not found in AudioDeviceCmdlets.csproj'
                  }

                  if ('${{ github.event_name }}' -eq 'push') {
                    $refVersion = '${{ github.ref_name }}'.TrimStart('v')
                    if ($refVersion -ne $version) {
                      throw "Git tag version '$refVersion' does not match project version '$version'"
                    }
                  }

                  "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

            - name: Build module
              shell: pwsh
              run: |
                  ./build.ps1 -Version "${{ steps.ver.outputs.version }}" -Configuration Release -OutputDir artifacts

            - name: Create release zip
              shell: pwsh
              run: |
                  $version = "${{ steps.ver.outputs.version }}"
                  $moduleName = 'AudioDeviceCmdlets'
                  $zipName = "$moduleName-$version.zip"
                  $artifactRoot = Join-Path $PWD 'artifacts'
                  $zipPath = Join-Path $PWD $zipName

                  if (Test-Path $zipPath) { Remove-Item -LiteralPath $zipPath -Force }
                  Compress-Archive -Path (Join-Path $artifactRoot $moduleName) -DestinationPath $zipPath

                  Get-FileHash -Algorithm SHA256 -Path $zipPath | ForEach-Object {
                    "$($_.Hash)  $zipName" | Out-File -FilePath ("$zipName.sha256") -Encoding ascii
                  }

            - name: Publish GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.ver.outputs.version }}
                  name: v${{ steps.ver.outputs.version }}
                  files: |
                      AudioDeviceCmdlets-${{ steps.ver.outputs.version }}.zip
                      AudioDeviceCmdlets-${{ steps.ver.outputs.version }}.zip.sha256
